<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#142036"/>
      <stop offset="1" stop-color="#0e1727"/>
    </linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#c6a157" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- nine-point serration top -->
  <g fill="#8a1538" fill-opacity="0.9">
    <path d="M0,0 L1200,0 L1200,18 L0,18 Z" fill="none"/>
  </g>
  <!-- serration strip -->
  <g fill="#8a1538">
    <!-- generate 9 triangles across the top -->
    <path d="M0 0 h1200 v6 H0 Z"/>
  </g>
  <!-- kufic Qatar mark -->
  <text x="600" y="250" text-anchor="middle" font-family="Reem Kufi, sans-serif" font-size="64" fill="#d8bd83" letter-spacing="2">قطر</text>
  <!-- wordmark -->
  <text x="600" y="360" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="104" fill="#f7f5f2" font-weight="500" letter-spacing="3">Alides</text>
  <!-- gold rule -->
  <line x1="540" y1="400" x2="660" y2="400" stroke="#c6a157" stroke-width="1.5"/>
  <!-- tagline -->
  <text x="600" y="455" text-anchor="middle" font-family="Jost, sans-serif" font-size="22" fill="#d8bd83" letter-spacing="6">EXECUTIVE SEARCH · BOARD ADVISORY</text>
  <text x="600" y="495" text-anchor="middle" font-family="Jost, sans-serif" font-size="20" fill="#6c7585" letter-spacing="7">DOHA · QATAR</text>
</svg>
